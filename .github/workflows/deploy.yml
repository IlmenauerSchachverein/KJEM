name: Build & Deploy Hugo Site

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: kjem-deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: false

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Install dos2unix
        run: sudo apt-get install -y dos2unix

      - name: Run build script
        run: |
          dos2unix ./build.sh
          chmod +x ./build.sh
          ./build.sh

      - name: Hugo Build
        run: |
          hugo mod tidy
          hugo --gc --minify --enableGitInfo

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          cname: kjem.ilmenauer-schachverein.de
          
  mirror-to-gitlab:
    name: Mirror to GitLab
    needs: build-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo (with LFS)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Fetch all branches and tags (safe)
        run: |
          set -euo pipefail
          git fetch --prune origin "+refs/heads/*:refs/remotes/origin/*" "+refs/tags/*:refs/tags/*"

      - name: Push to GitLab (all branches + tags + LFS)
        env:
          GITLAB_PAT: ${{ secrets.GITLAB_PAT }}
        run: |
          set -euo pipefail
          export GIT_TERMINAL_PROMPT=0

          git config --global user.name "CI Pipeline"
          git config --global user.email "info@ilmenauer-schachverein.de"
          git config --global core.compression 1

          git remote remove gitlab 2>/dev/null || true
          git remote add gitlab "https://oauth2:${GITLAB_PAT}@gitlab.erik-skopp.de/ilmenauerschachverein/turniere/kjem.git"

          git lfs install --local
          git lfs fetch --all

          git push --prune gitlab "+refs/remotes/origin/*:refs/heads/*" "+refs/tags/*:refs/tags/*"
          git lfs push --all gitlab
